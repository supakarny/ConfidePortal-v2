version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: confide-postgres
    environment:
      POSTGRES_USER: confide_admin
      POSTGRES_PASSWORD: confide_password
      POSTGRES_DB: confide_portal
    ports:
      - "5432:5432"
    volumes:
      - confide_pg_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  confide_pg_data:
